<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
  <script>
  // The function that runs on click
  function showMessage() {
    alert("Button was clicked using the onclick attribute!");
  }
      

</script>
</head>
<header>
  <ul class="topnav">
        <li><div class="headerstyle flex-container"><a href="/">Home</a></div></li>
        <li><div class="headerstyle flex-container"><a href="/about">About</a></div></li>
        <li><div class="headerstyle flex-container"><a href="/signin">Sign In</a></div></li>
        <li><div class="headerstyle flex-container"><a href="/contact">Contact</a></div></li>
      </ul>
</header>
<body>
  <span>
    <div>First Name: 
    <input type="text" id="firstname"></input>
    Last Name: 
    <input type="text" id="lastname"></input>
    Email Address: 
    <input type="text" id="emailaddress"></input>
    Password: 
    <input type="text" id="password"></input>
    </div>
  </span>


      <h2>Send Parameters to Python Script</h2>
    
    <!-- Form sends data via POST to the /run-script route -->
    <form action="/users" method="POST">
        <label>First Name:</label>
        <input type="text" name="FIRST_NAME" required>
        <br><br>
        
        <label>Last Name:</label>
        <input type="text" name="LAST_NAME" required>
        <br><br>

        <label>Email:</label>
        <input type="text" name="EMAIL_ADDRESS" required>
        <br><br>
        
        <button type="submit">Execute Python Script</button>
    </form>

    <!-- Displays the result if it exists -->
    <!-- {% if result %}
        <h3>Output from Python:</h3>
        <p>{{ result }}</p>
    {% endif %} -->
  <button onclick="showMessage()">SUBMIT</button>
</body>
</html>
